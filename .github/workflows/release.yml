name: Release

# Tagging vX.Y.Z publishes everywhere at once.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push Docker images to GHCR

jobs:
  goreleaser:
    name: GoReleaser (binaries, brew, scoop, deb/rpm/apk, docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history & tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-arch docker)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx (required by dockers_v2)
        uses: docker/setup-buildx-action@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT (repo scope) that can push to the tap/bucket repos.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}

  npm:
    name: Publish npm wrapper (npx @bayway/janusmcp)
    needs: goreleaser   # the wrapper downloads release assets at install time
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        working-directory: npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  mcp-registry:
    name: Publish to the official MCP Registry
    needs: npm   # the registry validates the npm package + its mcpName, so npm must be live first
    runs-on: ubuntu-latest
    continue-on-error: true   # the registry is in preview — an outage must not fail the release
    permissions:
      id-token: write   # OIDC: authenticates the io.github.bayway/* namespace, no stored secret
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Sync server.json version to the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v | (.packages[]?.version) = $v' server.json > server.tmp
          mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish
