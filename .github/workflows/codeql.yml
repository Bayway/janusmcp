name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  go:
    name: CodeQL (go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: manual

      # The Go module lives in ./go, so build it there for CodeQL to trace.
      - run: cd go && go build ./...

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  javascript:
    name: CodeQL (javascript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
